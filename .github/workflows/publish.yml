name: Publish

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: outegro/prod-backend
  SERVICE_NAME: prod-backend
  INFRA_MANIFEST: clusters/vps/prod/backend.yaml
  PNPM_VERSION: 11.1.2

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@${PNPM_VERSION} --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest

      - name: Build and publish image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest image
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Check infra token
        id: infra-token
        env:
          INFRA_UPDATE_TOKEN: ${{ secrets.INFRA_UPDATE_TOKEN }}
        run: |
          if [ -z "${INFRA_UPDATE_TOKEN}" ]; then
            echo "::notice::INFRA_UPDATE_TOKEN is not configured; infra PR creation is skipped."
            echo "available=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "available=true" >> "${GITHUB_OUTPUT}"

      - name: Checkout infra
        if: steps.infra-token.outputs.available == 'true'
        uses: actions/checkout@v6
        with:
          repository: outegro/infra
          ref: master
          token: ${{ secrets.INFRA_UPDATE_TOKEN }}
          path: infra

      - name: Update infra image tag
        if: steps.infra-token.outputs.available == 'true'
        working-directory: infra
        run: |
          image="${REGISTRY}/${IMAGE_NAME}:sha-${GITHUB_SHA}"
          sed -i "s|image: ${REGISTRY}/${IMAGE_NAME}:.*|image: ${image}|" "${INFRA_MANIFEST}"

          if git diff --quiet -- "${INFRA_MANIFEST}"; then
            echo "INFRA_CHANGED=false" >> "${GITHUB_ENV}"
            exit 0
          fi

          branch="deploy/${SERVICE_NAME}-${GITHUB_SHA::7}-${GITHUB_RUN_ID}"
          echo "INFRA_CHANGED=true" >> "${GITHUB_ENV}"
          echo "INFRA_BRANCH=${branch}" >> "${GITHUB_ENV}"

          git config user.name "outegro-ci"
          git config user.email "actions@github.com"
          git checkout -b "${branch}"
          git add "${INFRA_MANIFEST}"
          git commit -m "Deploy ${SERVICE_NAME} sha-${GITHUB_SHA}"
          git push origin "${branch}"

      - name: Create infra pull request
        if: steps.infra-token.outputs.available == 'true' && env.INFRA_CHANGED == 'true'
        working-directory: infra
        env:
          GH_TOKEN: ${{ secrets.INFRA_UPDATE_TOKEN }}
        run: |
          gh pr create \
            --repo outegro/infra \
            --base master \
            --head "${INFRA_BRANCH}" \
            --title "Deploy ${SERVICE_NAME} sha-${GITHUB_SHA::7}" \
            --body "Updates ${INFRA_MANIFEST} to ${REGISTRY}/${IMAGE_NAME}:sha-${GITHUB_SHA}."
